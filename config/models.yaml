models:
  # ==========================================================================
  # CODE MODELS (split by domain)
  # ==========================================================================

  game-dev:
    enabled: true
    architecture: dense
    base: "Qwen/Qwen3.6-27B"
    train_tool: unsloth
    train_method: qlora
    train_config: "config/train/game-dev.yaml"
    # Quantization format TBD — vLLM may not support Qwen3.6 yet, may need GGUF
    quant_format: tbd
    datasets:
      - name: "glaive-code-assistant-v3"
        source: "huggingface"
        hf_id: "glaiveai/glaive-code-assistant-v3"
        sample_size: null
        format: "sharegpt"
        filters:
          languages: ["python", "bash", "typescript", "cpp", "csharp", "gdscript"]
      - name: "CodeFeedback-Filtered-Instruction"
        source: "huggingface"
        hf_id: "m-a-p/CodeFeedback-Filtered-Instruction"
        sample_size: null
        format: "sharegpt"
      - name: "CommitPackFT"
        source: "huggingface"
        hf_id: "bigcode/commitpackft"
        sample_size: 50000
        format: "alpaca"
      - name: "game-engine-docs"
        source: "local"
        path: "datasets/raw/game-engine-docs/training/"
        format: "alpaca"
        custom: true
      - name: "game-dev-github"
        source: "local"
        path: "datasets/raw/game-dev-github/training/"
        format: "sharegpt"
        custom: true

  shader:
    enabled: true
    architecture: dense
    base: "mistralai/Devstral-Small-2-24B-Instruct-2512"
    train_method: qlora
    train_config: "config/train/shader.yaml"
    quant_format: tbd
    datasets:
      - name: "the-stack-v2-dedup"
        source: "huggingface"
        hf_id: "bigcode/the-stack-v2-dedup"
        sample_size: 50000
        format: "completion"
        filters:
          languages: ["glsl", "hlsl", "wgsl", "metal"]
          min_docstring_ratio: 0.1
          skip_generated: true
      - name: "shader-pipeline"
        source: "local"
        path: "datasets/raw/shader-pipeline/training/"
        format: "alpaca"
        custom: true

  fim:
    enabled: true
    architecture: dense
    base: "Qwen/Qwen2.5-Coder-1.5B"
    train_method: bf16_lora
    train_config: "config/train/fim.yaml"
    quant_format: tbd
    datasets:
      - name: "the-stack-v2-dedup"
        source: "huggingface"
        hf_id: "bigcode/the-stack-v2-dedup"
        sample_size: 50000
        format: "completion"
        filters:
          languages: ["python", "bash", "typescript", "cpp", "csharp", "gdscript"]
          min_docstring_ratio: 0.1
          skip_generated: true
      - name: "game-engine-docs"
        source: "local"
        path: "datasets/raw/game-engine-docs/training/"
        format: "alpaca"
        custom: true
      - name: "game-dev-github"
        source: "local"
        path: "datasets/raw/game-dev-github/training/"
        format: "sharegpt"
        custom: true

  companion:
    enabled: false  # hold for last — may switch to Qwen3.6-9B when available
    architecture: dense
    base: "Qwen/Qwen3.5-9B"
    train_method: bf16_lora
    train_config: "config/train/companion.yaml"
    quant_format: tbd
    datasets:
      - name: "glaive-code-assistant-v3"
        source: "huggingface"
        hf_id: "glaiveai/glaive-code-assistant-v3"
        sample_size: null
        format: "sharegpt"
        filters:
          languages: ["python", "bash", "typescript", "cpp", "csharp", "gdscript"]
      - name: "CodeFeedback-Filtered-Instruction"
        source: "huggingface"
        hf_id: "m-a-p/CodeFeedback-Filtered-Instruction"
        sample_size: null
        format: "sharegpt"
      - name: "game-engine-docs"
        source: "local"
        path: "datasets/raw/game-engine-docs/training/"
        format: "alpaca"
        custom: true
      - name: "game-dev-github"
        source: "local"
        path: "datasets/raw/game-dev-github/training/"
        format: "sharegpt"
        custom: true

  # ==========================================================================
  # NON-CODE MODELS (unchanged)
  # ==========================================================================

  creative:
    enabled: true
    architecture: dense
    base: "THUDM/glm-4-9b-chat"
    train_method: qlora
    train_config: "config/train/creative.yaml"
    quant_format: tbd
    datasets:
      - name: "lmsys-chat-1m-creative"
        source: "huggingface"
        hf_id: "lmsys/lmsys-chat-1m"
        sample_size: 30000
        format: "sharegpt"
        filters:
          categories: ["creative", "writing", "roleplay", "worldbuilding"]
      - name: "cosmopedia-v2"
        source: "huggingface"
        hf_id: "HuggingFaceTB/cosmopedia-v2"
        sample_size: 50000
        format: "alpaca"
      - name: "OpenOrca-planning"
        source: "huggingface"
        hf_id: "Open-Orca/OpenOrca"
        sample_size: 30000
        format: "sharegpt"
        filters:
          categories: ["planning", "analytical", "structured"]
      - name: "UltraFeedback"
        source: "huggingface"
        hf_id: "openbmb/UltraFeedback"
        sample_size: null
        format: "preference"
      - name: "game-lore"
        source: "local"
        path: "datasets/raw/game-lore/"
        format: "sharegpt"
        custom: true
      - name: "project-plans"
        source: "local"
        path: "datasets/raw/project-plans/"
        format: "alpaca"
        custom: true
      - name: "store-marketing"
        source: "local"
        path: "datasets/raw/store-marketing/"
        format: "alpaca"
        custom: true

  chat:
    enabled: true
    architecture: dense
    base: "THUDM/glm-4-9b-chat"
    train_method: qlora
    train_config: "config/train/chat.yaml"
    quant_format: tbd
    datasets:
      - name: "lmsys-chat-1m"
        source: "huggingface"
        hf_id: "lmsys/lmsys-chat-1m"
        sample_size: 100000
        format: "sharegpt"
      - name: "ShareGPT-Vicuna-unfiltered"
        source: "huggingface"
        hf_id: "anon8231489123/ShareGPT_Vicuna_unfiltered"
        sample_size: null
        format: "sharegpt"
      - name: "Capybara"
        source: "huggingface"
        hf_id: "LDJnr/Capybara"
        sample_size: null
        format: "sharegpt"
      - name: "personal-style"
        source: "local"
        path: "datasets/raw/personal-style/"
        format: "sharegpt"
        custom: true
