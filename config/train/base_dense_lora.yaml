# bf16 LoRA settings for small dense models (Strix Halo, 128GB unified)
# Use for models <=14B where full bf16 loading is feasible.
# Avoids quantization artifacts during training.

method: lora

lora:
  r: 64
  alpha: 128
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  dropout: 0.05

quantization:
  load_in_4bit: false  # full bf16, no quantization during training

training:
  num_epochs: 3
  batch_size: 8
  gradient_accumulation: 2  # effective batch = 16
  gradient_checkpointing: false  # not needed for <=14B on 128GB
  learning_rate: 2.0e-4
  lr_scheduler: cosine
  warmup_ratio: 0.03
  max_seq_length: 8192

optimizer: paged_adamw_8bit

# Post-training
merge: true
quantize_output:
  method: gptq
  bits: 4
  group_size: 128
  calibration_samples: 256
