# Game dev specialization (Qwen3.6-27B, bf16 LoRA on ROCm)
overrides:
  qwen3.6-27b:
    training:
      batch_size: 2
      gradient_accumulation: 8  # effective batch = 16
      max_seq_length: 8192
    # Qwen3.6-27B uses a hybrid GatedDeltaNet + full attention architecture.
    # 3 of every 4 layers are GatedDeltaNet (in_proj_* / out_proj),
    # every 4th is standard attention (q/k/v/o_proj). Both need LoRA coverage.
    lora:
      target_modules:
        - q_proj
        - k_proj
        - v_proj
        - o_proj
        - in_proj_qkv
        - in_proj_z
        - in_proj_b
        - in_proj_a
        - out_proj
        - gate_proj
        - up_proj
        - down_proj
