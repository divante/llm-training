specializations:
  game-dev:
    datasets_config: "config/train/game-dev.yaml"
    eval_suite: ["humaneval", "mbpp"]
    custom_eval: "datasets/eval/game-dev.jsonl"
  shader:
    datasets_config: "config/train/shader.yaml"
    eval_suite: ["humaneval"]
    custom_eval: "datasets/eval/shader.jsonl"
  fim:
    datasets_config: "config/train/fim.yaml"
    eval_suite: ["humaneval_fim"]
    custom_eval: "datasets/eval/fim.jsonl"
  companion:
    datasets_config: "config/train/companion.yaml"
    eval_suite: ["humaneval", "mbpp"]
    custom_eval: "datasets/eval/companion.jsonl"
  creative:
    datasets_config: "config/train/creative.yaml"
    eval_suite: ["mt_bench_writing", "alpaca_eval_writing"]
    custom_eval: "datasets/eval/creative.jsonl"
  chat:
    datasets_config: "config/train/chat.yaml"
    eval_suite: ["mt_bench", "alpaca_eval"]
    custom_eval: "datasets/eval/chat.jsonl"

bases:
  qwen3.6-27b:
    hf_id: "Qwen/Qwen3.6-27B"
    architecture: dense
    train_method: qlora
    train_tool: unsloth
  devstral-small-2-24b:
    hf_id: "mistralai/Devstral-Small-2-24B-Instruct-2512"
    architecture: dense
    train_method: qlora
  qwen2.5-coder-1.5b:
    hf_id: "Qwen/Qwen2.5-Coder-1.5B"
    architecture: dense
    train_method: bf16_lora
  qwen3.5-9b:
    hf_id: "Qwen/Qwen3.5-9B"
    architecture: dense
    train_method: bf16_lora
  glm-4-9b:
    hf_id: "THUDM/glm-4-9b-chat"
    architecture: dense
    train_method: bf16_lora

# ===================================================================
# QUANTIZATION — TBD
#
# vLLM support for Qwen3.6 and Devstral-Small-2 is unverified.
# May need GGUF (llama.cpp) instead of GPTQ for serving.
# Defer decision until after training completes.
# ===================================================================

quant_levels:
  gptq_int4: { method: gptq, bits: 4, group_size: 128, backend: vllm }
  gptq_int8: { method: gptq, bits: 8, group_size: 32,  backend: vllm }
  # gguf_q4: { method: gguf, gguf_type: "Q4_K_M", backend: llamacpp }

# Experiments to run — priority order
experiments:
  # --- Priority 1: Game dev (Unreal/Godot) ---
  - base: qwen3.6-27b
    quants: [gptq_int4]
    specializations: [game-dev]

  # --- Priority 2: Shader ---
  - base: devstral-small-2-24b
    quants: [gptq_int4]
    specializations: [shader]

  # --- Priority 3: FIM autocomplete ---
  - base: qwen2.5-coder-1.5b
    quants: [gptq_int4]
    specializations: [fim]

  # --- Priority 4: Companion (held — waiting for Qwen3.6-9B) ---
  # - base: qwen3.5-9b
  #   quants: [gptq_int4]
  #   specializations: [companion]

  # --- Creative + Chat (unchanged) ---
  - base: glm-4-9b
    quants: [gptq_int4]
    specializations: [creative, chat]

cleanup:
  delete_merged_after_quantize: true
  delete_lora_after_merge: false
  keep_last_n_checkpoints: 2
